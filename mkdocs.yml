site_name: ProteinGen
site_url: https://ishan-gaur.github.io/proteingen/
repo_url: https://github.com/ishan-gaur/proteingen
repo_name: ishan-gaur/proteingen

theme:
  name: material
  palette:
    - scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: amber
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.integrate

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - toc:
      permalink: true

plugins:
  - search
  - liveedit
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            heading_level: 3
            members_order: source
            docstring_style: google
            show_signature_annotations: true
            separate_signature: true

nav:
  - Home: index.md
  - Setup: setup.md
  - Examples:
    - Overview: examples/index.md
    - Unconditional Sampling: examples/unconditional-sampling.md
    - Structure-Conditioned Sampling: examples/structure-conditioned-sampling.md
    - Guided Sampling (TrpB): examples/trpb-linear-probe.md
    - Likelihood Curves: examples/likelihood-curves.md
    - Benchmark — Model Families: examples/benchmark-model-families.md
    - Fine-tuning ESM3 (MLM): examples/finetune-esm3-mlm.md
    - Fine-tuning Inverse Folding: examples/finetune-inverse-folding.md
    - Stability-Guided Generation: examples/stability-guided-generation.md
    - PCA Embedding Init: examples/pca-embedding-init.md
  - Models:
    - Overview: models/index.md
    - ESMC: models/esmc.md
    - ESM3: models/esm3.md
    - DPLM-2: models/dplm2.md
    - ESM Forge API: models/esm-forge-api.md
    - ProteinMPNN: models/proteinmpnn.md
    - StabilityPMPNN: models/stability-pmpnn.md
  - Workflows:
    - Overview: workflows/index.md
    - Workflows:
      - ProteinGuide: workflows/protein-guide.md
      - Continued Pretraining: workflows/continued-pretraining.md
    - "Modules — Data":
      - MSA Acquisition: workflows/msa-acquisition.md
      - MSA → Dataset: workflows/msa-to-dataset.md
      - Data Splits: workflows/data-splits.md
    - "Modules — Models":
      - Fine-tuning Generative Models: workflows/finetune-generative.md
      - Training Predictors: workflows/training-predictors.md
    - "Modules — Evaluation":
      - Likelihood Curves: workflows/likelihood-curves.md
  - Contributing: contributing.md
  - Reference:
    - Design Philosophy: reference/design-philosophy.md
    - Data:
      - data: reference/data.md
    - Models:
      - probability_model: reference/probability_model.md
      - generative_modeling: reference/generative_modeling.md
      - predictive_modeling: reference/predictive_modeling.md
      - guide: reference/guide.md
      - models: reference/models.md
    - Sampling:
      - sampling: reference/sampling.md
    - Evaluation:
      - evaluation: reference/evaluation.md
