site_name: ProteinGen
site_url: https://ishan-gaur.github.io/proteingen/
repo_url: https://github.com/ishan-gaur/proteingen
repo_name: ishan-gaur/proteingen

theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/images/blank-favicon.png
  palette:
    - scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: amber
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.integrate

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

extra:
  announcement: "🧪 ProteinGen is in private beta, <a href='mailto:ishang@berkeley.edu?subject=Request%20to%20join%20ProteinGen%20Beta%20Test&body=Hi%20Ishan%2C%0A%0AI%27d%20like%20to%20try%20out%20ProteinGen.%20%28If%20you%27d%20like%20to%2C%20feel%20free%20to%20tell%20us%20a%20bit%20about%20yourself%20and%20what%20you%20want%20to%20use%20ProteinGen%20for%20here%20as%20well.%29'>email me</a> at ishang@berkeley.edu if you'd like to try it out."

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - toc:
      permalink: true

plugins:
  - search
  - liveedit
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            heading_level: 3
            members_order: source
            docstring_style: google
            show_signature_annotations: true
            separate_signature: true

